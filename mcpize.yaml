version: 1
runtime: typescript
entry: src/index.ts

build:
  install: npm ci
  command: npm run build

startCommand:
  type: http
  command: node dist/index.js

configSchema:
  source: code

env:
  - name: OUTSCRAPER_API_KEY
    description: "Outscraper API key for business search and review data (free tier: 500 reviews/month)"
    required: true
    sensitive: true
  - name: ENABLE_MOCK_MODE
    description: "Set to true to use mock data without API credentials"
    required: false
    default: "false"
  - name: LOG_LEVEL
    description: "Logging level (debug, info, warn, error)"
    required: false
    default: "info"
